<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Розв'язання матричних задач</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.5.0/math.min.js"></script>
    <script type="module" src="main.js"></script>
</head>
<body>

<div class="container">
    <h2>Розрахунок матричних операцій</h2>

    <label for="matrixSize">Розмірність матриці:</label>
    <select id="matrixSize">
        <option value="1x3">1×3</option>
        <option value="2x3">2×3</option>
        <option value="3x3" selected>3×3</option>
        <option value="4x3">4×3</option>
        <option value="5x3">5×3</option>
        <option value="3x4">3×4</option>
        <option value="3x5">3×5</option>
        <option value="4x4">4×4</option>
        <option value="5x5">5×5</option>
    </select>

    <section class="matrix-container">
        <div>
            <h3>Матриця A:</h3>
            <table id="matrixA"></table>
        </div>
        <div>
            <h3>Матриця B:</h3>
            <table id="matrixB"></table>
        </div>
    </section>

    <section class="buttons-container">
        <button id="inverse-btn">Знайти обернену матрицю</button>
        <button id="rank-btn">Знайти ранг матриці</button>
        <button id="solve-btn">Розв'язати СЛАР (обернена матриця)</button>
        <button id="downloadProtocolBtn">Завантажити протокол</button>
    </section>

    <h3 id="header-output">Результати обчислень:</h3>
    <div id="output"></div>
</div>

</body>
</html>
